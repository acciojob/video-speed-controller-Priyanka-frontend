<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Scrubber</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
        <h1>🎥 Video Speed Controller</h1>
        
        <div class="player">
            <video class="player__video" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
            <div class="player__controls">
                <div class="progress">
                    <div class="progress__filled"></div>
                </div>

                <div class="controls">
                    <button class="toggle">►</button>
                    
                    <button class="rewind">« 10s</button>
                    <button class="forward">25s »</button>

                    <div class="control-group">
                        <span class="control-label">Volume:</span>
                        <input type="range" name="volume" class="volume" min="0" max="100" value="50">
                        <span class="value-display volume-value">50%</span>
                    </div>

                    <div class="control-group">
                        <span class="control-label">Speed:</span>
                        <input type="range" name="playbackSpeed" class="playbackSpeed" min="0.25" max="2" step="0.25" value="1">
                        <span class="value-display speed-value">1x</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script  src="./script.js"></script>
</body>
</html>
