<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Speed Scrubber</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="wrapper">
    <video class="flex" width="765" height="430" 
		src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>
    <div class="speed">
      <div class="speed-bar">1×</div>
    </div>
  </div>

<script  src="./script.js">
  const speed = document.querySelector(".speed");
const speedBar = document.querySelector(".speed-bar");
const video = document.querySelector(".flex");

// minimum and maximum playback speed
const min = 0.5;
const max = 4;

function handleMove(e) {
  const rect = speed.getBoundingClientRect();

  // mouse position inside the box (0 to height)
  const y = e.pageY - rect.top - window.scrollY;

  // convert to percentage
  const percent = y / rect.height;

  // convert to speed range
  const playbackRate = percent * (max - min) + min;

  // clamp values
  const finalRate = Math.min(max, Math.max(min, playbackRate));

  // update UI
  speedBar.style.height = `${percent * 100}%`;
  speedBar.textContent = finalRate.toFixed(2) + "×";

  // update video speed
  video.playbackRate = finalRate;
}

speed.addEventListener("mousemove", handleMove);
</script>
</body>
</html>
